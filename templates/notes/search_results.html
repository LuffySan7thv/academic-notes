<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نتایج جست و جو</title>
</head>
<body>
    <h2>نتایج جستوجو"{{ query }}"</h2>
    <ul>
        {% for note in notes %}
            <li>
                <strong>{{ note.title }}</strong>
                {% if note.file %}
                    - <a href="{{ note.file.url }}" target="_blank">مشاهده فایل🎉</a>
                    (<a href="{{note.file.uel }}" download>دانلود⬇️</a>)
                {% endif %}
                <br>
                <small>درس: {{ note.course.name }}</small>
            </li>
        {% empty %}
            <li>هیچ جزوه ای پیدا نشد🧐</li>
        {% endfor %}
    </ul>
    <a href="{% url 'course_list' %}">بازگشت به لیست درسها➡️📚✨</a>
</body>
</html>
