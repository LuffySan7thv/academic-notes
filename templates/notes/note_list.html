<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جزوه های{{ course.name }}</title>
</head>
<body>
    <h1>جزوه های🧾🌼{{course.name}}</h1>
    <form method="get" action="{% url 'search_notes' course.id %}">
        <input type="text" name="q" placeholder="جستوجو در جزوه های این درس🧾🔍">
        <button type="submit">جستوجو🔍🧐</button>
    </form>

    <ul>
        {% for note in notes %}
            <li>
                {{note.title}}
                {% if note.file %}
                    - <a href="{{ note.file.url }}" target="_blank">مشاهده فایل🤗</a>
                    (<a href="{{ note.file.url }}" download>دانلود⬇️</a>)
                {% endif %}
                <a href="{% url 'note_delete' note.id %}" style="color:red;margin-left:10px;">حذف جزوه❌</a>
            </li>
        {% empty %}
            <li>هیچ جزوه ای هوز ثبت نشده🧐🕸️</li>
        {% endfor %}
    </ul>

    <br>
    {% if user.is_authenticated %}
    <a href="{% url 'note_create' course.id %}">افزودن جزوه جدید➕📚</a>
    {% endif %}
    <br>
    <a href="{% url 'course_list' %}">بازگشت به لیست درسها➡️</a>
</body>
</html>
