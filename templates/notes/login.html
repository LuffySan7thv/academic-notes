<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود</title>
</head>
<body>
    <h2>ورود🗝️🔓</h2>

    {% if form.errors %}
        <div style="color: red; direction: rtl; margin-bottom: 10px;">
            {% for field in form %}
                {% for error in field.errors %}
                    <p>{{ error }}</p>
                {% endfor %}
            {% endfor %}
            {% for error in form.non_field_errors %}
                <p>{{ error }}</p>
            {% endfor %}
        </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        {{ form.as_p}}
        <button type="submit">ورود</button>
    </form>
    <p>حساب کاربری ندارید؟<a href="{% url 'register' %}">ثبت نام کن</a></p>
</body>
</html>
